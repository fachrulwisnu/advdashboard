<style>
  :root {
    --ws-accent: #2563EB;
    --ws-card-pad: 20px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Public Sans', system-ui, -apple-system, sans-serif;
    background: #0B1120;
    color: #111827;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    overflow: hidden;
  }
  .ws-card {
    position: relative;
    background: #FFFFFF;
    border: 1px solid #E8EBF0;
    border-radius: 14px;
    padding: var(--ws-card-pad);
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
  }
  .ws-kpi { transition: box-shadow .15s, transform .15s, border-color .15s; }
  .ws-kpi:hover { box-shadow: 0 6px 20px rgba(37,99,235,.14); transform: translateY(-2px); border-color: #C7D7FB; }
  .ws-hide-subtitles .ws-card > div > div > div:nth-child(2) { display: none; }
  .ws-nav-item:hover { background: #F5F7FB !important; }
  .ws-scroll::-webkit-scrollbar { width: 9px; }
  .ws-scroll::-webkit-scrollbar-thumb { background: #D7DCE5; border-radius: 999px; border: 2px solid #F5F6FA; }
  .ws-scroll::-webkit-scrollbar-track { background: transparent; }
  .ws-btn-primary {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--ws-accent); color: #fff; border: none;
    font-size: 13px; font-weight: 600; font-family: inherit;
    padding: 9px 15px; border-radius: 9px; cursor: pointer;
  }
  .ws-btn-primary:hover { filter: brightness(.95); }
  .ws-btn-ghost {
    background: #FFFFFF; color: #6B7280; border: 1px solid #E8EBF0;
    font-size: 13px; font-weight: 600; font-family: inherit;
    padding: 9px 15px; border-radius: 9px; cursor: pointer;
  }
  .ws-btn-ghost:hover { background: #F5F7FB; }
  .ws-icon-btn {
    width: 42px; height: 42px;
    display: inline-flex; align-items: center; justify-content: center;
    background: #FFFFFF; border: 1px solid #E8EBF0; border-radius: 10px;
    cursor: pointer; padding: 0;
  }
  .ws-icon-btn:hover { background: #F5F7FB; border-color: #C7D7FB; }
  .ws-table { width: 100%; border-collapse: collapse; }
  .ws-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #9CA3AF;
    padding: 9px 10px;
    border-bottom: 1px solid #E8EBF0;
    white-space: nowrap;
  }
  .ws-table td {
    padding: 11px 10px;
    border-bottom: 1px solid #F1F3F7;
    font-size: 13.5px;
    vertical-align: middle;
  }
  .ws-table tbody tr:last-child td { border-bottom: none; }
  .ws-table tbody tr:hover td { background: #FAFBFD; }
  .ws-pgbtn {
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    background: #FFFFFF;
    border: 1px solid #E8EBF0;
    border-radius: 7px;
    cursor: pointer;
    padding: 0;
  }
  .ws-pgbtn:disabled { cursor: default; }
  .ws-pgbtn:not(:disabled):hover { background: #F5F7FB; }
  input::placeholder { color: #B6BCC8; }
</style>
</head>
